{% extends 'base.html' %}
{% block title %}Employee Login — NexusBank{% endblock %}
{% block body %}
<div class="nb-auth">
  <div class="nb-auth-card">
    <div class="nb-auth-header">
      <div class="nb-auth-logo" style="background:linear-gradient(135deg,#0891b2,#06b6d4)"><i class="bi bi-person-badge"></i></div>
      <h1 class="nb-auth-title">Employee Portal</h1>
      <p class="nb-auth-subtitle">Sign in with your employee credentials</p>
    </div>
    <form action="{{ url_for('auth.employee_login') }}" method="POST" class="nb-form">
      <div class="nb-form-group">
        <label class="nb-label">Employee ID</label>
        <input name="emp_id" type="text" class="nb-input" placeholder="NB-EMP-001" required>
      </div>
      <div class="nb-form-group">
        <label class="nb-label">Password</label>
        <input name="password" type="password" class="nb-input" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary w-full" style="justify-content:center;padding:14px;background:linear-gradient(135deg,#0e7490,#0891b2)">
        <i class="bi bi-box-arrow-in-right"></i> Employee Login
      </button>
    </form>
    <div class="nb-auth-footer">
      New employee? <a href="{{ url_for('auth.employee_register') }}">Register</a>
      &nbsp;|&nbsp; <a href="{{ url_for('main.index') }}">← Home</a>
    </div>
  </div>
</div>
{% endblock %}
