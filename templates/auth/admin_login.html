{% extends 'base.html' %}
{% block title %}Admin Portal — NexusBank{% endblock %}
{% block body %}
<div class="nb-auth">
  <div class="nb-auth-card">
    <div class="nb-auth-header">
      <div class="nb-auth-logo" style="background:linear-gradient(135deg,#7f1d1d,#dc2626)"><i class="bi bi-shield-lock"></i></div>
      <h1 class="nb-auth-title">Admin Portal</h1>
      <p class="nb-auth-subtitle">Restricted access — authorized personnel only</p>
    </div>
    <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px;margin-bottom:20px;font-size:13px;color:#991b1b;display:flex;align-items:center;gap:8px">
      <i class="bi bi-shield-exclamation"></i>
      This is a secure admin portal. All access is logged and monitored.
    </div>
    <form action="{{ url_for('auth.admin_login') }}" method="POST" class="nb-form">
      <div class="nb-form-group">
        <label class="nb-label">Admin Username</label>
        <input name="username" type="text" class="nb-input" placeholder="admin" required>
      </div>
      <div class="nb-form-group">
        <label class="nb-label">Password</label>
        <input name="password" type="password" class="nb-input" placeholder="Admin password" required>
      </div>
      <button type="submit" class="btn-primary w-full" style="justify-content:center;padding:14px;background:linear-gradient(135deg,#7f1d1d,#dc2626)">
        <i class="bi bi-shield-lock"></i> Admin Login
      </button>
    </form>
    <div class="nb-auth-footer">
      <a href="{{ url_for('main.index') }}">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
