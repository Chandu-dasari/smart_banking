{% extends 'base.html' %}
{% block title %}Face Verification — NexusBank{% endblock %}
{% block body %}
<div class="nb-auth">
  <div class="nb-auth-card">
    <div class="nb-auth-header">
      <div class="nb-auth-logo" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)"><i class="bi bi-person-bounding-box"></i></div>
      <h1 class="nb-auth-title">Face Verification</h1>
      <p class="nb-auth-subtitle">Look at the camera to verify your identity</p>
    </div>

    <div class="face-capture-container">
      <div class="face-oval-wrapper" id="ovalWrapper">
        <video id="webcamVideo" autoplay muted playsinline></video>
        <div class="face-oval-overlay" id="ovalOverlay">
          <div class="face-scan-line"></div>
        </div>
      </div>
      <canvas id="snapCanvas" style="display:none"></canvas>

      <div id="faceStatus" class="face-status">📷 Starting camera...</div>

      <div style="background:#f0f4ff;border-radius:12px;padding:14px;width:100%;font-size:13px;color:var(--nb-text-2);text-align:center">
        <i class="bi bi-info-circle" style="color:var(--nb-blue)"></i>
        Look straight into the camera with a neutral expression
      </div>

      <button id="verifyBtn" class="btn-primary w-full" style="justify-content:center;padding:14px;display:none" onclick="verifyFace()">
        <i class="bi bi-camera"></i> Verify My Face
      </button>
      <div id="processingMsg" style="display:none;text-align:center;color:var(--nb-text-2)">
        <span class="nb-spinner"></span> Verifying identity...
      </div>

      <div id="resultBox" style="display:none;width:100%;padding:16px;border-radius:12px;text-align:center;font-weight:600"></div>

      <a href="{{ url_for('auth.login') }}" style="font-size:13px;color:var(--nb-text-3);text-decoration:none">← Back to Login</a>
    </div>
  </div>
</div>

<script>
let stream = null;
let autoVerifyDone = false;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    document.getElementById('webcamVideo').srcObject = stream;
    document.getElementById('faceStatus').textContent = '✅ Camera ready. Click verify when ready.';
    document.getElementById('faceStatus').className = 'face-status good';
    document.getElementById('ovalOverlay').classList.add('detected');
    document.getElementById('verifyBtn').style.display = 'block';
  } catch(e) {
    document.getElementById('faceStatus').textContent = '❌ Camera access denied.';
    document.getElementById('faceStatus').className = 'face-status bad';
    document.getElementById('verifyBtn').style.display = 'block';
  }
}

async function verifyFace() {
  const btn = document.getElementById('verifyBtn');
  const proc = document.getElementById('processingMsg');
  const video = document.getElementById('webcamVideo');

  btn.style.display = 'none';
  proc.style.display = 'block';

  const canvas = document.getElementById('snapCanvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const imageData = canvas.toDataURL('image/jpeg', 0.95);

  try {
    const res = await fetch('{{ url_for("auth.face_verify") }}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData })
    });
    const data = await res.json();
    proc.style.display = 'none';

    const resultBox = document.getElementById('resultBox');
    resultBox.style.display = 'block';

    if (data.success) {
      resultBox.style.background = '#f0fdf4';
      resultBox.style.color = '#166534';
      resultBox.style.border = '1px solid #bbf7d0';
      resultBox.innerHTML = `<i class="bi bi-shield-fill-check" style="font-size:28px;display:block;margin-bottom:8px"></i>
        Identity Verified! (${(data.score * 100).toFixed(1)}%)<br>
        <small style="font-weight:400">Redirecting to dashboard...</small>`;
      if (stream) stream.getTracks().forEach(t => t.stop());
      setTimeout(() => { window.location.href = data.redirect; }, 1500);
    } else {
      resultBox.style.background = '#fef2f2';
      resultBox.style.color = '#991b1b';
      resultBox.style.border = '1px solid #fecaca';
      resultBox.innerHTML = `<i class="bi bi-x-circle" style="font-size:28px;display:block;margin-bottom:8px"></i>
        ${data.message || 'Face not recognized'}`;
      btn.style.display = 'block';
      btn.innerHTML = '<i class="bi bi-camera"></i> Try Again';
    }
  } catch(e) {
    proc.style.display = 'none';
    document.getElementById('faceStatus').textContent = '❌ Network error. Try again.';
    btn.style.display = 'block';
  }
}

window.addEventListener('load', startCamera);
window.addEventListener('beforeunload', () => { if(stream) stream.getTracks().forEach(t=>t.stop()); });
</script>
{% endblock %}
