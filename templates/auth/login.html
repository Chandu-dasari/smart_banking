{% extends 'base.html' %}
{% block title %}Sign In — NexusBank{% endblock %}
{% block body %}
<div class="nb-auth">
  <div class="nb-auth-card">
    <div class="nb-auth-header">
      <div class="nb-auth-logo"><i class="bi bi-bank2"></i></div>
      <h1 class="nb-auth-title">Welcome Back</h1>
      <p class="nb-auth-subtitle">Sign in to your NexusBank account</p>
    </div>
    <form action="{{ url_for('auth.login') }}" method="POST" class="nb-form">
      <div class="nb-form-group">
        <label class="nb-label">Email Address</label>
        <div style="position:relative">
          <i class="bi bi-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--nb-text-3)"></i>
          <input name="email" type="email" class="nb-input" style="padding-left:42px" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="nb-form-group">
        <label class="nb-label">Password</label>
        <div style="position:relative">
          <i class="bi bi-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--nb-text-3)"></i>
          <input name="password" type="password" id="pwdInput" class="nb-input" style="padding-left:42px" placeholder="Your password" required>
          <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--nb-text-3)"><i class="bi bi-eye" id="pwdIcon"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-primary w-full" style="justify-content:center;padding:14px;margin-top:8px">
        <i class="bi bi-box-arrow-in-right"></i> Send OTP & Login
      </button>
    </form>
    <div style="margin-top:16px;padding:14px;background:#f0f4ff;border-radius:12px;font-size:13px;color:var(--nb-text-2)">
      <i class="bi bi-shield-lock" style="color:var(--nb-blue)"></i>
      <strong>Secure Login:</strong> You'll receive an OTP via email, then verify your face.
    </div>
    <div class="nb-auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create Account</a>
    </div>
  </div>
</div>
<script>
function togglePwd() {
  const i = document.getElementById('pwdInput');
  const icon = document.getElementById('pwdIcon');
  i.type = i.type === 'password' ? 'text' : 'password';
  icon.className = i.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
